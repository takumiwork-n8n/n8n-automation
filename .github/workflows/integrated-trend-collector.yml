name: Integrated Trend Collector

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  actions: read
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/Integrated Trend Collector v4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore previous state artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p state logs
          artifact_id="$(gh api "repos/${REPO}/actions/artifacts?name=integrated-trend-collector-state&per_page=1" --jq '.artifacts[] | select(.expired == false) | .id' | head -n 1 || true)"
          if [ -n "${artifact_id}" ]; then
            gh api "repos/${REPO}/actions/artifacts/${artifact_id}/zip" > /tmp/integrated-trend-collector-state.zip
            python - <<'PY'
import zipfile
with zipfile.ZipFile('/tmp/integrated-trend-collector-state.zip') as zf:
    zf.extractall('.')
PY
          else
            echo "No previous artifact found"
          fi

      - name: Run collector
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python3 src/trend_collector.py --settings config/settings.yaml

      - name: Upload state and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrated-trend-collector-state
          path: |
            workflows/Integrated Trend Collector v4.1/state
            workflows/Integrated Trend Collector v4.1/logs
          if-no-files-found: warn
          retention-days: 90
